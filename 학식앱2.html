<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>우리학교 식탁 v9 - 글로벌 에디션</title>
<style>
  body { font-family: 'Pretendard', sans-serif; background-color: #f2f4f7; margin: 0; padding: 0; display: flex; justify-content: center; color: #333; }
  .app-screen { width: 100%; max-width: 420px; background: white; min-height: 100vh; position: relative; padding-bottom: 80px; box-shadow: 0 0 20px rgba(0,0,0,0.1); }
  
  /* 헤더 및 프로필 */
  .header { background: #2E7D32; color: white; padding: 25px 20px; border-bottom-left-radius: 20px; border-bottom-right-radius: 20px; }
  .user-info { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
  .user-name { font-size: 18px; font-weight: bold; margin: 0; }
  
  /* 언어 전환 버튼 (강조) */
  .lang-toggle { background: #FF9800; color: white; border: none; padding: 5px 12px; border-radius: 15px; font-weight: bold; cursor: pointer; font-size: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
  
  .point-card { background: white; color: #2E7D32; padding: 15px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; }
  .charge-btn { background: #4CAF50; color: white; border: none; padding: 6px 12px; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 12px; }

  .content { padding: 15px 20px; }
  
  /* 운영 정책 알림 */
  .policy-box { background: #FFF3E0; border-radius: 10px; padding: 12px; margin-bottom: 15px; font-size: 12px; color: #E65100; border: 1px solid #FFE0B2; line-height: 1.6; }

  /* 요일 선택 */
  .day-selector { display: flex; justify-content: space-between; background: #f8f9fa; padding: 5px; border-radius: 10px; margin-bottom: 15px; }
  .day-btn { flex: 1; border: none; background: none; padding: 10px 0; font-size: 13px; cursor: pointer; border-radius: 8px; color: #777; font-weight: bold;}
  .day-btn.active { background: #2E7D32; color: white; }

  /* 메뉴 카드 */
  .menu-card { border: 1px solid #eee; border-radius: 15px; padding: 15px; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
  .menu-title { font-size: 17px; font-weight: bold; margin: 8px 0; }
  .menu-price { color: #2E7D32; font-weight: bold; font-size: 14px; margin-bottom: 10px; }
  
  .option-select { width: 100%; padding: 10px; margin-top: 5px; border-radius: 8px; border: 1px solid #ddd; font-size: 13px; background: #fafafa; }
  .reserve-btn { width: 100%; background: #2E7D32; color: white; border: none; padding: 14px; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 15px; font-size: 15px; }

  .bottom-nav { position: fixed; bottom: 0; width: 100%; max-width: 420px; background: white; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #eee; }
  .nav-item { text-align: center; color: #999; font-size: 11px; }
</style>
</head>
<body>

<div class="app-screen">
  <div class="header">
    <div class="user-info">
      <div>
        <p class="user-name" id="txt-welcome">김철수 학생님 (Hello, Chulsu)</p>
        <p style="font-size:12px; opacity:0.8;">ID: 202412345</p>
      </div>
      <button class="lang-toggle" onclick="toggleLanguage()" id="btn-lang">English</button>
    </div>
    <div class="point-card">
      <div><span id="txt-point">내 포인트</span>: <b>12,500 P</b></div>
      <button class="charge-btn" id="btn-charge">+ 충전</button>
    </div>
  </div>

  <div class="content">
    <div class="policy-box" id="box-policy">
      📍 <b>점심 전용 운영</b> (11:30~13:30)<br>
      📍 예약: 4,500P (현장결제: 5,500P)<br>
      📍 노쇼 시 예약금 1,000P 제외 환불
    </div>

    <div class="day-selector" id="day-tabs">
      <button class="day-btn active" onclick="changeDay('mon')">월 (Mon)</button>
      <button class="day-btn" onclick="changeDay('tue')">화 (Tue)</button>
      <button class="day-btn" onclick="changeDay('wed')">수 (Wed)</button>
      <button class="day-btn" onclick="changeDay('thu')">목 (Thu)</button>
      <button class="day-btn" onclick="changeDay('fri')">금 (Fri)</button>
    </div>

    <div id="menu-list">
      </div>
  </div>

  <div class="bottom-nav">
    <div class="nav-item">🏠 <span id="nav-home">홈</span></div>
    <div class="nav-item">🎫 <span id="nav-ticket">내 식권</span></div>
    <div class="nav-item">💬 <span id="nav-help">문의</span></div>
  </div>
</div>

<script>
  let currentLang = 'ko'; // 기본값 한국어

  // 다국어 데이터베이스
  const i18n = {
    ko: {
      welcome: "김철수 학생님 환영합니다!",
      point: "내 포인트",
      charge: "+ 충전",
      policy: "📍 <b>점심 전용 운영</b> (11:30~13:30)<br>📍 예약: 4,500P (현장결제: 5,500P)<br>📍 노쇼 시 예약금 1,000P 제외 환불",
      btnLang: "English",
      reserve: "예약 및 결제하기",
      optRice: ["밥 양: 기본", "밥 양: 적게 (No-Waste)", "밥 양: 많이"],
      optMain: ["메인: 기본", "메인: 많이 (+1,000P)"],
      nav: ["예약", "식권", "문의"],
      alert: "예약하시겠습니까?"
    },
    en: {
      welcome: "Welcome, Chulsu Kim!",
      point: "My Balance",
      charge: "+ Top-up",
      policy: "📍 <b>Lunch Only</b> (11:30~13:30)<br>📍 Pre-order: 4,500P (Walk-in: 5,500P)<br>📍 No-show penalty: 1,000P deducted from refund",
      btnLang: "한국어",
      reserve: "Reserve & Pay Now",
      optRice: ["Rice: Regular", "Rice: Small (Eco-friendly)", "Rice: Large"],
      optMain: ["Main: Regular", "Main: Extra (+1,000P)"],
      nav: ["Reserve", "Ticket", "Help"],
      alert: "Would you like to reserve?"
    }
  };

  const dailyMenus = {
    mon: { ko: "매콤 제육 쌈밥 정식", en: "Spicy Pork Wrap Set" },
    tue: { ko: "춘천식 닭갈비 정식", en: "Chuncheon Chicken Stir-fry" },
    wed: { ko: "수제 등심 돈까스", en: "Handmade Pork Cutlet" },
    thu: { ko: "소불고기 버섯 전골", en: "Bulgogi Mushroom Hot Pot" },
    fri: { ko: "매콤 오징어 볶음", en: "Spicy Stir-fried Squid" }
  };

  let selectedDay = 'mon';

  function toggleLanguage() {
    currentLang = (currentLang === 'ko') ? 'en' : 'ko';
    updateUI();
  }

  function updateUI() {
    const lang = i18n[currentLang];
    document.getElementById('txt-welcome').innerText = lang.welcome;
    document.getElementById('txt-point').innerText = lang.point;
    document.getElementById('btn-charge').innerText = lang.charge;
    document.getElementById('box-policy').innerHTML = lang.policy;
    document.getElementById('btn-lang').innerText = lang.btnLang;
    document.getElementById('nav-home').innerText = lang.nav[0];
    document.getElementById('nav-ticket').innerText = lang.nav[1];
    document.getElementById('nav-help').innerText = lang.nav[2];
    
    renderMenu();
  }

  function changeDay(day) {
    selectedDay = day;
    const btns = document.querySelectorAll('.day-btn');
    btns.forEach((b, idx) => {
        b.classList.remove('active');
        if(['mon','tue','wed','thu','fri'][idx] === day) b.classList.add('active');
    });
    renderMenu();
  }

  function renderMenu() {
    const container = document.getElementById('menu-list');
    const lang = i18n[currentLang];
    const menuName = dailyMenus[selectedDay][currentLang];

    container.innerHTML = `
      <div class="menu-card">
        <div class="menu-title">${menuName}</div>
        <div class="menu-price">4,500P</div>
        <select class="option-select">
          <option>${lang.optRice[0]}</option>
          <option>${lang.optRice[1]}</option>
          <option>${lang.optRice[2]}</option>
        </select>
        <select class="option-select" style="margin-top:10px;">
          <option>${lang.optMain[0]}</option>
          <option>${lang.optMain[1]}</option>
        </select>
        <button class="reserve-btn" onclick="alert('${lang.alert}')">${lang.reserve}</button>
      </div>
    `;
  }

  // 초기 실행
  updateUI();
</script>
</body>
</html>
